name: Deploy GitHub Pages

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build validated revision
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    permissions:
      contents: read
      pages: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_APP_ENV: ${{ vars.VITE_APP_ENV || 'test' }}
      VITE_DEMO_MODE: ${{ vars.VITE_DEMO_MODE || 'true' }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/AURA/' }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_ENABLE_PASSKEYS: ${{ vars.VITE_ENABLE_PASSKEYS || 'false' }}
      VITE_ENABLE_AI_NARRATION: ${{ vars.VITE_ENABLE_AI_NARRATION || 'false' }}
      VITE_ENABLE_TRANSCRIPTION: ${{ vars.VITE_ENABLE_TRANSCRIPTION || 'false' }}
      VITE_ENABLE_SECURE_HANDOFF_LINKS: ${{ vars.VITE_ENABLE_SECURE_HANDOFF_LINKS || 'false' }}
      VITE_ENABLE_BROWSER_NOTIFICATIONS: ${{ vars.VITE_ENABLE_BROWSER_NOTIFICATIONS || 'false' }}

    steps:
      - name: Check out validated source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
