project_id = "aura"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/**", "http://127.0.0.1:5173/**"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "25MiB"

[functions.resolve-username]
verify_jwt = false

[functions.narrate-insight]
verify_jwt = true

[functions.secure-handoff]
verify_jwt = false

[functions.admin-users]
verify_jwt = true
